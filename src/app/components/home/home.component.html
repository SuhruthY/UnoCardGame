<div class="home-screen">
  <div class="home-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="home-content">
    <div class="logo-area">
      <div class="logo-card">🃏</div>
      <h1>UNO</h1>
      <p class="subtitle">Play against the Bot</p>
    </div>

    <div class="rules-card">
      <div class="rule">
        <span class="rule-icon">🎯</span>
        <span>Match cards by color, number, or symbol</span>
      </div>
      <div class="rule">
        <span class="rule-icon">⏭️</span>
        <span>Use action cards to skip, reverse, or make opponent draw</span>
      </div>
      <div class="rule">
        <span class="rule-icon">🃏</span>
        <span>Wild cards let you change the color</span>
      </div>
      <div class="rule">
        <span class="rule-icon">🏆</span>
        <span>First to empty their hand wins!</span>
      </div>
    </div>

    <button class="btn-play" (click)="startGame()">
      <span class="btn-icon">▶</span>
      <span class="btn-text">Play Now</span>
    </button>
  </div>
</div>
