<div class="login-screen">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-area">
        <span class="logo-icon">🃏</span>
        <h1>UNO</h1>
        <span class="logo-sub">Battle Royale</span>
      </div>
    </div>

    <div class="form-area">
      <h2>{{ isRegister ? 'Create Account' : 'Welcome Back' }}</h2>
      <p class="form-sub">{{ isRegister ? 'Join the arena' : 'Login to continue' }}</p>

      <div class="input-group">
        <label class="input-label">Username</label>
        <input
          class="auth-input"
          type="text"
          [(ngModel)]="username"
          placeholder="Enter username"
          maxlength="20"
          (keyup.enter)="submit()"
        />
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input
          class="auth-input"
          type="password"
          [(ngModel)]="password"
          placeholder="Enter password"
          (keyup.enter)="submit()"
        />
      </div>

      <div class="input-group" *ngIf="isRegister">
        <label class="input-label">Confirm Password</label>
        <input
          class="auth-input"
          type="password"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm password"
          (keyup.enter)="submit()"
        />
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button class="btn-submit" (click)="submit()" [class.loading]="loading">
        {{ loading ? 'Please wait...' : (isRegister ? 'Register' : 'Login') }}
      </button>

      <div class="toggle-area">
        <span>{{ isRegister ? 'Already have an account?' : "Don't have an account?" }}</span>
        <button class="btn-toggle" (click)="toggleMode()">
          {{ isRegister ? 'Login' : 'Register' }}
        </button>
      </div>
    </div>
  </div>
</div>
